<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Digital Grand Line | Play Mode</title>
  <script src="https://cdn.jsdelivr.net/npm/phaser@3/dist/phaser.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&display=swap');
    
    body {
      margin: 0; padding: 0;
      background: #050000;
      overflow: hidden;
      font-family: 'Outfit', sans-serif;
    }

    #gameContainer {
      width: 100vw; height: 100vh;
      display: flex; align-items: center; justify-content: center;
    }

    canvas {
      box-shadow: 0 0 100px rgba(160, 0, 0, 0.4);
      border: 1px solid rgba(212, 169, 106, 0.1);
    }

    #ui-layer {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none; z-index: 10; padding: 30px;
      box-sizing: border-box;
      display: flex; justify-content: space-between; align-items: flex-start;
    }

    .exit-btn {
      pointer-events: auto;
      padding: 12px 24px;
      background: rgba(255, 0, 0, 0.1);
      color: #fff;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 30px;
      cursor: pointer;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      font-size: 0.75rem;
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      backdrop-filter: blur(10px);
    }
    .exit-btn:hover {
      background: #ff0000;
      border-color: #ff0000;
      box-shadow: 0 0 30px rgba(255, 0, 0, 0.5);
    }

    .game-logo {
      color: #D4A96A;
      font-size: 1.5rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      text-shadow: 0 0 20px rgba(212, 169, 106, 0.4);
    }
  </style>
</head>
<body>

  <div id="ui-layer">
    <div class="game-logo">Play Mode</div>
    <button class="exit-btn" onclick="exitToPortfolio()">Exit Voyage ✕</button>
  </div>

  <div id="gameContainer"></div>

  <script src="game.js"></script>

  <script>
    function exitToPortfolio() {
      // Smooth fade out then redirect
      document.body.style.transition = 'opacity 0.8s';
      document.body.style.opacity = '0';
      setTimeout(() => {
        window.location.href = "../index.html";
      }, 800);
    }
  </script>

</body>
</html>
